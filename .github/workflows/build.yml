name: Build BlueDesk for macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build for macOS
        run: npm run dist:mac
      
      - uses: actions/upload-artifact@v4
        with:
          name: BlueDesk-macOS
          path: dist/*.dmg